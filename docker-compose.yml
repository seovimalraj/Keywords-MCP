services:
  keywords-mcp:
    image: ghcr.io/seovimalraj/keywords-mcp:latest
    container_name: keywords-mcp
    restart: unless-stopped
    labels:
      org.opencontainers.image.source: "https://github.com/seovimalraj/Keywords-MCP"
      org.opencontainers.image.url: "https://github.com/seovimalraj/Keywords-MCP"
      org.opencontainers.image.documentation: "https://github.com/seovimalraj/Keywords-MCP#readme"
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      # Set these in Dokploy's environment variable UI — do NOT hardcode secrets here
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      MCP_API_KEY: ${MCP_API_KEY}
      # OAuth 2.0
      OAUTH_CLIENT_ID: ${OAUTH_CLIENT_ID}
      OAUTH_CLIENT_SECRET: ${OAUTH_CLIENT_SECRET}
      OAUTH_USERNAME: ${OAUTH_USERNAME:-admin}
      OAUTH_PASSWORD: ${OAUTH_PASSWORD}
      OAUTH_TOKEN_TTL: ${OAUTH_TOKEN_TTL:-86400000}
      OAUTH_REDIRECT_URIS: ${OAUTH_REDIRECT_URIS:-}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
